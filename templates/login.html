<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>MAP-T Config - Login</title>
  <link rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='logo.png') }}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background-attachment: fixed;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      width: 100%;
      max-width: 450px;
      backdrop-filter: blur(10px);
    }

    .login-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 20px;
      text-align: center;
      color: white;
    }

    .login-header img {
      height: 80px;
      margin-bottom: 15px;
    }

    .login-header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .login-header p {
      font-size: 0.95rem;
      margin: 8px 0 0 0;
      opacity: 0.9;
    }

    .login-body {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      display: block;
      font-size: 0.95rem;
    }

    .form-control {
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      transition: all 0.3s ease;
      background-color: #f9f9f9;
    }

    .form-control:focus {
      border-color: #667eea;
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-control::placeholder {
      color: #999;
    }

    .login-btn {
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .alert {
      border-radius: 10px;
      margin-bottom: 20px;
      border: none;
    }

    .login-footer {
      text-align: center;
      padding: 20px 40px;
      background-color: #f9f9f9;
      border-top: 1px solid #e0e0e0;
      color: #666;
      font-size: 0.9rem;
    }

    .slack-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 15px;
      background-color: #f0f0f0;
      border-radius: 10px;
      margin-top: 20px;
    }

    .slack-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #0d6efd;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .slack-link:hover {
      color: #764ba2;
    }

    .slack-icon {
      font-size: 1.5rem;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <!-- Header -->
    <div class="login-header">
      <img src="{{ url_for('static', filename='CTC.png') }}" alt="Comcast Logo">
      <h1>MAP-T Config</h1>
      <p>Secure Access Portal</p>
    </div>

    <!-- Login Form -->
    <div class="login-body">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert alert-danger">
            {% for message in messages %}
              {{ message }}
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-label">
            <i class="bi bi-person-circle"></i> Username
          </label>
          <input type="text" class="form-control" name="username" placeholder="Enter your username" required autofocus>
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="bi bi-lock-fill"></i> Password
          </label>
          <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>

      <!-- Slack Help -->
      <div class="slack-section">
        <span>Need Help?</span>
        <a href="https://comcast.enterprise.slack.com/archives/C0AV8U9DY78" class="slack-link" target="_blank">
          <img src="{{ url_for('static', filename='slack-logo.svg') }}" alt="Slack" style="height: 24px; width: 24px;">
          <span>Slack Support</span>
        </a>
      </div>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <p>© 2026 Comcast. All rights reserved. | <strong>MAP-T Configuration Tool</strong></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
